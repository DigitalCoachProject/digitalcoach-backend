services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitalcoach-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      # Override these values in a local .env file for production-like runs.
      # Example:
      # MSSQL_SA_PASSWORD=replace_with_a_strong_sql_password
      # JWT_KEY=replace_with_a_long_random_secret_at_least_32_bytes
      # JWT_ISSUER=DigitalCoach
      # JWT_AUDIENCE=DigitalCoach.Mobile
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=DigitalCoachDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;MultipleActiveResultSets=True
      Jwt__Key: ${JWT_KEY:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
      Jwt__Issuer: ${JWT_ISSUER:-DigitalCoach}
      Jwt__Audience: ${JWT_AUDIENCE:-DigitalCoach.Mobile}
      Jwt__ExpiresMinutes: 120
    ports:
      - "5050:8080"
    volumes:
      - api-data-protection:/app/App_Data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: digitalcoach-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_password123}
      MSSQL_PID: Developer
    ports:
      - "1435:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; if [ ! -x $$SQLCMD ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd; fi; $$SQLCMD -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: digitalcoach-nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  api-data-protection:
  sqlserver-data:
