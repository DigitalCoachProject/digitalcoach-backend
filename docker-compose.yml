services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitalcoach-api
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=DigitalCoachDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;MultipleActiveResultSets=True
      Jwt__Issuer: DigitalCoach
      Jwt__Audience: DigitalCoach.Mobile
      Jwt__SecretKey: ${JWT_SECRET:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
      Jwt__ExpiresMinutes: 120
    ports:
      - "8080:8080"
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: digitalcoach-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_password123}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD:-Your_strong_password123} -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: digitalcoach-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database/schema.sql:/schema/schema.sql:ro
    command: /bin/bash -c "if /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${MSSQL_SA_PASSWORD:-Your_strong_password123} -Q \"SELECT name FROM sys.databases WHERE name = 'DigitalCoachDb'\" | grep -q DigitalCoachDb; then echo 'DigitalCoachDb already exists'; else /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P ${MSSQL_SA_PASSWORD:-Your_strong_password123} -i /schema/schema.sql; fi"
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: digitalcoach-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  sqlserver-data:
